name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NoteStitch/NoteStitch.csproj

      - name: Build
        run: dotnet build NoteStitch/NoteStitch.csproj -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish NoteStitch/NoteStitch.csproj
          -c Release
          --no-restore
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: NoteStitch
          path: publish/NoteStitch.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: NoteStitch
          path: publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/NoteStitch.exe
          generate_release_notes: true
